# version: '3.9'

services:

  postgres:
    image: postgres:16
    container_name: logistics-postgres

    restart: always

    environment:
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: admin
      POSTGRES_DB: logistics

    ports:
      - "5432:5432"

    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7
    container_name: logistics-redis

    restart: always

    ports:
      - "6379:6379"

  backend:
    build:
      context: ./apps/backend
      dockerfile: Dockerfile
    container_name: billkro-backend
    
    restart: always
    
    depends_on:
      - postgres
      - redis
    
    environment:
      DATABASE_URL: postgresql://admin:admin@postgres:5432/logistics
      REDIS_URL: redis://redis:6379
      NODE_ENV: development
      PORT: 3001
    
    ports:
      - "3001:3001"
    
    volumes:
      - ./apps/backend:/app
      - /app/node_modules

volumes:
  postgres_data: